<!DOCTYPE html>
<html lang ='en'>
    <head>
        <meta charset="UTF-8">
    </head>
    <body>
        <h1>This is a counter within an HTML file</h1>
        <h2>It counts I guess (This was option 2)</h2>
        <p id="counter">0</p>
        <button class="btn" onclick="increment()">Click here</button>
    </body>

    <script>
        let x = 0;
        const increment = ()=> {
            x++;
            document.getElementById('counter').innerHTML = x;
        }
    </script>
</html>
